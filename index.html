<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Campos Formativos</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h2>Arrastra cada elemento al campo formativo correcto</h2>

<div class="main">

<!-- CAMPOS -->
<div class="fields">

<div class="field">
  <strong>🌱 Ética, Naturaleza y Sociedades</strong>
  <div class="dropzone" data-correct="Derechos Humanos,Cultura de Paz"></div>
</div>

<div class="field">
  <strong>👥 De lo Humano y lo Comunitario</strong>
  <div class="dropzone" data-correct="Sentido de Pertenencia,Autocuidado"></div>
</div>

<div class="field">
  <strong>💬 Lenguajes</strong>
  <div class="dropzone" data-correct="Comunicación Asertiva"></div>
</div>

<div class="field">
  <strong>🔬 Saberes y pensamiento científico</strong>
  <div class="dropzone" data-correct="Indagación y Prevención,Pensamiento Crítico"></div>
</div>

</div>

<!-- BANCO -->
<div class="bank" id="bank">

<div class="item" draggable="true">Derechos Humanos</div>
<div class="item" draggable="true">Cultura de Paz</div>
<div class="item" draggable="true">Sentido de Pertenencia</div>
<div class="item" draggable="true">Autocuidado</div>
<div class="item" draggable="true">Comunicación Asertiva</div>
<div class="item" draggable="true">Indagación y Prevención</div>
<div class="item" draggable="true">Pensamiento Crítico</div>

</div>

</div>

<!-- BOTONES -->
<div class="actions">
<button onclick="checkAnswers()">Verificar</button>
<button onclick="resetGame()">Reiniciar</button>
</div>

<!-- MENSAJE -->
<div id="message"></div>

</div>

<script src="script.js"></script>
</body>
</html>
